<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindArchive</title>
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1 class="logo">🧠 MindArchive</h1>
      <span id="platformBadge" class="badge badge--inactive">检测中…</span>
    </header>

    <!-- Status Bar -->
    <div id="statusBar" class="status-bar">
      <span id="statusText">正在检测平台…</span>
    </div>

    <!-- Main Actions -->
    <section id="actions" class="actions" style="display: none;">
      <div class="actions-row">
        <button id="captureBtn" class="btn btn--primary">
          📥 捕获对话
        </button>
        <button id="exportBtn" class="btn btn--secondary" disabled>
          💾 导出
        </button>
      </div>
    </section>

    <!-- History Loading Progress -->
    <section id="loadProgress" class="load-progress" style="display: none;">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <span id="progressText" class="progress-text">正在加载历史消息…</span>
    </section>

    <!-- Conversation Preview -->
    <section id="preview" class="preview" style="display: none;">
      <div class="preview-header">
        <h3 id="previewTitle">对话预览</h3>
        <span id="previewCount" class="badge badge--info">0 条消息</span>
      </div>
      <div id="previewContent" class="preview-content"></div>
    </section>



    <!-- DeepSeek One-Time Auth -->
    <section id="deepseekAuth" class="deepseek-auth" style="display: none;">
      <div class="deepseek-auth-header">🔐 DeepSeek 需要一次性授权</div>
      <ol class="deepseek-auth-steps">
        <li>按 <kbd>F12</kbd> 打开开发者工具 → <b>Network</b> 标签</li>
        <li>找到 <code>history_messages</code> 请求 → 右键 → <b>Copy as fetch</b></li>
        <li>粘贴到下方输入框 → 点击确认</li>
      </ol>
      <textarea id="deepseekFetchCode" class="deepseek-auth-textarea"
        placeholder="粘贴 fetch(...) 代码到这里" rows="4"></textarea>
      <button id="deepseekAuthConfirm" class="btn btn--primary btn--full">
        确认并提取对话
      </button>
      <span id="deepseekAuthError" class="deepseek-auth-error" style="display: none;"></span>
    </section>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state">
      <p>打开 ChatGPT 或 Claude 对话页面开始使用</p>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>2.0</span>
    </footer>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
